name: defulo
description: "Sistema de Gestão de Inteligência Rural - Offline-First Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0
  flutter: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # HTTP & Network
  dio: ^5.3.0
  connectivity_plus: ^5.0.0

  # Local Database
  drift: ^2.13.0
  sqlite3_flutter_libs: ^0.5.8
  sqflite_sqlcipher: ^3.4.0

  # Utils
  uuid: ^4.0.0
  crypto: ^3.0.3
  intl: ^0.19.0

  # Background Tasks
  workmanager: ^0.5.2

  # Logging
  logger: ^2.0.0

  # Serialization
  json_annotation: ^4.8.0
  freezed_annotation: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.0
  drift_dev: ^2.13.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.3.0
  custom_lint: ^0.5.0
  riverpod_lint: ^2.3.0

flutter:
  uses-material-design: true
